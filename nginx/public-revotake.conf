# Configuración Nginx para public-revotake.golinkia.com
# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name public-revotake.golinkia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS con SSL
server {
    listen 443 ssl http2;
    server_name public-revotake.golinkia.com;

    ssl_certificate /etc/letsencrypt/live/public-revotake.golinkia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/public-revotake.golinkia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Backend FastAPI (mismo que revotake.golinkia.com)
    location /api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Uploads estáticos del backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:8002/uploads/;
        proxy_set_header Host $host;
    }

    # Redirige raíz al portal público
    location = / {
        return 301 https://$host/explorar;
    }

    # Frontend Next.js en Vercel
    location / {
        proxy_pass https://revotake-golinkias-projects.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header Host revotake-golinkias-projects.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
